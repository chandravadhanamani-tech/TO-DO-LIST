<div class="card p-4 shadow">

<h2>Add Task</h2>

<form method="POST">

<label>Title</label>

<input
type="text"
name="title"
class="form-control"
required>

<br>

<label>Description</label>

<textarea
name="description"
class="form-control"></textarea>

<br>

<label>Priority</label>

<select
name="priority"
class="form-control">

<option>High</option>

<option>Medium</option>

<option>Low</option>

</select>

<br>

<label>Due Date</label>

<input
type="date"
name="due_date"
class="form-control">

<br>

<button
class="btn btn-primary">

Save Task

</button>

</form>

</div>

{% endblock %}
