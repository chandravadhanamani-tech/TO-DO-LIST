{% extends "layout.html" %}

{% block content %}

<div class="card p-4 shadow">

<h2 class="text-center mb-4">
Login
</h2>

<form method="POST">

<input class="form-control mb-3"
type="email"
name="email"
placeholder="Email"
required>

<input class="form-control mb-3"
type="password"
name="password"
placeholder="Password"
required>

<button class="btn btn-primary w-100">

Login

</button>

</form>

<br>

<a href="/register">

Create Account

</a>

</div>

{% endblock %}
